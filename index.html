<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvista</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8f6ef;
}

.screen{
    max-width:420px;
    margin:auto;
    padding:25px;
}

.button{
    width:100%;
    padding:18px;
    margin:15px 0;
    font-size:24px;
    border-radius:14px;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:22px;
    padding:18px 0;
    border-bottom:1px solid #ddd;
}

textarea{
    width:100%;
    height:250px;
    font-size:20px;
    padding:15px;
    box-sizing:border-box;
    border-radius:10px;
}

.hidden{
    display:none;
}

.back{
    cursor:pointer;
    font-size:20px;
    margin-bottom:20px;
}
</style>

</head>

<body>

<div id="home" class="screen">

<h2 style="text-align:center;">NUVISTA</h2>

<button class="button">
🎤 Konuş
</button>

<button class="button" onclick="openWrite()">
✍️ Yaz
</button>

<div class="row">
<span>Bugün</span>
<span>2</span>
</div>

<div class="row">
<span>Bu Hafta</span>
<span>5</span>
</div>

</div>


<div id="writeScreen" class="screen hidden">

<div class="back" onclick="goHome()">
← Geri
</div>

<h2>Notunu yaz</h2>

<textarea placeholder="Aklından geçenleri yaz..."></textarea>

<br><br>

<button class="button">
Kaydet
</button>

</div>

<script>

function openWrite(){
document.getElementById("home").classList.add("hidden");
document.getElementById("writeScreen").classList.remove("hidden");
}

function goHome(){
document.getElementById("writeScreen").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
}

</script>

</body>
</html>
